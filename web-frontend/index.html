<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AlignX - Protein Structure Alignment Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- 3Dmol.js for WebGL molecular visualization -->
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <!-- Plotly.js for interactive scientific charts -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js" charset="utf-8"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        // "Editorial Instrument" design system: warm dark ground, serif
        // headings + sans UI + monospace data, one coral accent, exactly one
        // hard-shadow ("brutalist") primary button. See docs/design/DESIGN.md.
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "bg": "#100E0B",
                        "surface": "#171310",
                        "surface-raised": "#1E1813",
                        "border": "#2C2620",
                        "border-subtle": "#221D18",
                        "primary": "#EDE7DC",
                        "secondary": "#A79E8E",
                        "muted": "#625B4E",
                        "accent": "#E2846A",
                        "accent-muted": "#35281F",
                        "tertiary": "#F59E0B",
                        "success": "#8FAE83",
                        "error": "#EF4444",
                        "warning": "#F59E0B"
                    },
                    "borderRadius": {
                        "lg": "0.625rem"
                    },
                    "spacing": {
                        "gap": "24px",
                        "max-container": "1440px",
                        "margin": "24px",
                        "sidebar-width": "280px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Georgia", "Iowan Old Style", "Times New Roman", "serif"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Georgia", "Iowan Old Style", "Times New Roman", "serif"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Georgia", "Iowan Old Style", "Times New Roman", "serif"],
                        "mono": ["ui-monospace", "SF Mono", "Consolas", "monospace"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "1", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="font-body-md text-body-md h-screen overflow-hidden flex flex-col antialiased bg-bg text-primary">
    <div id="app" class="h-screen overflow-hidden flex flex-col"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
