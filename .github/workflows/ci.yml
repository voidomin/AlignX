name: StructScope CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade --require-hashes -r requirements-pip.txt
          # --only-binary :all: blocks arbitrary setup.py/build-backend code
          # execution from a compromised sdist. fpdf (see requirements.txt)
          # ships no wheel at all and is exempted via --no-binary.
          # --require-hashes: requirements.txt is a pip-compile --generate-hashes
          # lock file (generated from requirements.in) - refuses to install
          # anything whose downloaded artifact doesn't match the hash recorded
          # when the lock file was generated.
          pip install --require-hashes --only-binary :all: --no-binary fpdf -r requirements.txt

      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check .

      - name: Check formatting with black
        run: |
          black --check .

      - name: Audit Python dependencies for known vulnerabilities
        run: |
          # requirements-ci.txt is a separate pip-compile --generate-hashes
          # lock file (from requirements-ci.in) for this CI-only tool, kept
          # apart from the app's own requirements.txt/.in.
          pip install --require-hashes --only-binary :all: -r requirements-ci.txt
          pip-audit -r requirements.txt

      - name: Test with pytest
        run: |
          pytest --cov=src --cov-report=xml tests/
        env:
          PYTHONPATH: .

      # Consumed by the sonarqube job below - SonarCloud's Automatic
      # Analysis (the mode this project used before) can't ingest coverage
      # reports at all, which is the whole reason analysis moved to CI.
      - name: Upload backend coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 1

  frontend-tests:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-frontend

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-frontend/package-lock.json

      # --ignore-scripts blocks npm packages' preinstall/install/postinstall
      # lifecycle hooks from running arbitrary code - confirmed harmless here
      # (tests, coverage, and the production build all still succeed; no
      # dependency in this project's tree needs an install-time script).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit npm dependencies for known vulnerabilities
        run: npm audit --audit-level=high

      - name: Lint with ESLint
        run: npm run lint

      - name: Run Vitest
        run: npm test

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: web-frontend/coverage/lcov.info
          retention-days: 1

      - name: Build (sanity check)
        run: npm run build

  sonarqube:
    name: SonarQube Cloud scan
    runs-on: ubuntu-latest
    needs: [build, frontend-tests]
    # Dependabot-authored PRs never get repository secrets injected into the
    # workflow run (a GitHub platform security restriction, not something
    # this repo controls) - SONAR_TOKEN is empty there, so the scan always
    # failed with "sonar-scanner exit code 3" regardless of what the actual
    # dependency bump changed. A job skipped via this condition counts as
    # "not applicable" for a required status check, not a failure, so it no
    # longer blocks every single Dependabot PR from merging. (`secrets` isn't
    # a valid context for a job-level `if:`, so this checks the actor instead
    # - equivalent here, since Dependabot is the only trigger that lacks
    # secrets access.)
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Disabling shallow clone improves the accuracy of SonarCloud's
          # "new code" blame-based reporting (the same period the Quality
          # Gate's conditions are evaluated against).
          fetch-depth: 0

      - name: Download backend coverage report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: backend-coverage

      - name: Download frontend coverage report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-coverage
          path: web-frontend/coverage

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build:
    name: Docker build + smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Prior to this job, every Docker-image verification in this project's
      # history was manual/ad hoc (see CHANGELOG "Verified" entries) - this
      # runs the actual production Dockerfile (Mustang compile included) on
      # every push/PR instead of relying on someone remembering to do it.
      - name: Build image
        run: docker build -t structscope:ci .

      - name: Run container
        run: docker run -d --name structscope-ci -p 8000:8000 structscope:ci

      - name: Wait for the container to report healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo
              echo "Container is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "Container never became healthy within 60s." >&2
          docker logs structscope-ci
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs structscope-ci

      - name: Stop and remove container
        if: always()
        run: docker rm -f structscope-ci
