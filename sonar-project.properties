# static/ is the built Vite SPA output (regenerated from web-frontend/src/
# via scripts/build_frontend.ps1, then committed for Docker to copy as-is -
# see docs/deployment/DEPLOYMENT.md). It's minified/bundled, not source, so
# findings there don't correspond to anything fixable and get silently
# overwritten on the next build anyway. web-frontend/dist/ is the same
# build's pre-copy location. .venv and node_modules are dependencies, not
# this project's code. .agents/skills/ is vendored third-party tooling.
sonar.exclusions=static/**,web-frontend/dist/**,web-frontend/node_modules/**,.venv/**,.agents/**,data/**,results/**

# This file wasn't read while SonarCloud ran in Automatic Analysis mode
# (confirmed via api/settings/values - sonar.exclusions above had no
# effect) - see docs/deployment/DEPLOYMENT.md or CHANGELOG's 3.15.0 entry.
# Now that analysis is CI-driven (see .github/workflows/ci.yml's sonarqube
# job, added in 3.23.0 to get real test-coverage reporting - Automatic
# Analysis can't ingest coverage reports at all), every setting below
# actually takes effect.
sonar.python.version=3.10
sonar.sourceEncoding=UTF-8
sonar.projectKey=voidomin_AlignX
sonar.organization=voidomin

# Coverage reports generated by the CI test jobs before the sonarqube job
# runs (see ci.yml) - without these, SonarCloud has no coverage data at
# all despite 245+142 real tests existing.
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=web-frontend/coverage/lcov.info

# Without this, SonarCloud has no way to know tests/*.py and *.test.js are
# test code rather than main source - coverage.py/Vitest never instrument
# a test file's own lines (they measure what the test exercises elsewhere),
# so every test file showed up as "0% covered new code" and was being
# counted against the coverage gate right alongside real gaps. Confirmed
# via api/measures/component_tree: tests/test_annotation_aggregator.py
# alone contributed 458 of the 5292 total "uncovered new lines" before
# this was set.
#
# sonar.tests is Python-only (tests/ contains nothing but test files, so
# it's unambiguous). JS test files are colocated with real source
# (Foo.js next to Foo.test.js) - putting web-frontend/src under
# sonar.tests too over-corrected and excluded every real .js source file
# from coverage requirements as well (new_lines_to_cover dropped to a
# suspicious 0, confirmed via re-analysis). sonar.test.inclusions alone
# correctly reclassifies just the matching *.test.js files without
# touching their sibling source files.
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py,web-frontend/src/**/*.test.js
