# static/ is the built Vite SPA output (regenerated from web-frontend/src/
# via scripts/build_frontend.ps1, then committed for Docker to copy as-is -
# see docs/deployment/DEPLOYMENT.md). It's minified/bundled, not source, so
# findings there don't correspond to anything fixable and get silently
# overwritten on the next build anyway. web-frontend/dist/ is the same
# build's pre-copy location. .venv and node_modules are dependencies, not
# this project's code. .agents/skills/ is vendored third-party tooling.
sonar.exclusions=static/**,web-frontend/dist/**,web-frontend/node_modules/**,.venv/**,.agents/**,data/**,results/**

# This file isn't actually read while SonarCloud is running in Automatic
# Analysis mode (confirmed via api/settings/values - sonar.exclusions above
# has never taken effect) - see docs/deployment/DEPLOYMENT.md or CHANGELOG's
# 3.15.0 entry. Kept here anyway (harmless, and takes effect the moment
# analysis ever switches to CI-driven), and the two settings below are
# worth having regardless since they're cheap and match the project's
# real target (Dockerfile's python:3.10-slim, README's "Python 3.10+").
sonar.python.version=3.10
sonar.sourceEncoding=UTF-8
