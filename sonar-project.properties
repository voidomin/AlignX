# static/ is the built Vite SPA output (regenerated from web-frontend/src/
# via scripts/build_frontend.ps1, then committed for Docker to copy as-is -
# see docs/deployment/DEPLOYMENT.md). It's minified/bundled, not source, so
# findings there don't correspond to anything fixable and get silently
# overwritten on the next build anyway. web-frontend/dist/ is the same
# build's pre-copy location. .venv and node_modules are dependencies, not
# this project's code. .agents/skills/ is vendored third-party tooling.
# CHANGELOG.md is deliberately repetitive prose (every entry follows the
# same Added/Fixed/Verified template) - real duplication in changelog
# narrative isn't a maintainability risk the way duplicated code is, and a
# large batch of releases in one PR (e.g. this one) was tripping the
# duplication gate purely on templated changelog text, not actual code.
sonar.exclusions=static/**,web-frontend/dist/**,web-frontend/node_modules/**,.venv/**,.agents/**,data/**,results/**,CHANGELOG.md

# This file wasn't read while SonarCloud ran in Automatic Analysis mode
# (confirmed via api/settings/values - sonar.exclusions above had no
# effect) - see docs/deployment/DEPLOYMENT.md or CHANGELOG's 3.15.0 entry.
# Now that analysis is CI-driven (see .github/workflows/ci.yml's sonarqube
# job, added in 3.23.0 to get real test-coverage reporting - Automatic
# Analysis can't ingest coverage reports at all), every setting below
# actually takes effect.
sonar.python.version=3.10
sonar.sourceEncoding=UTF-8
sonar.projectKey=voidomin_AlignX
sonar.organization=voidomin

# Coverage reports generated by the CI test jobs before the sonarqube job
# runs (see ci.yml) - without these, SonarCloud has no coverage data at
# all despite 245+142 real tests existing.
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=web-frontend/coverage/lcov.info

# Coverage tools never instrument a test file's own lines (they measure
# what the test exercises elsewhere), so every test file was showing up
# as "0% covered new code" and being counted against the coverage gate
# right alongside real gaps - tests/test_annotation_aggregator.py alone
# contributed 458 of the 5292 total "uncovered new lines" once coverage
# reporting started in 3.23.0. An earlier attempt to fix this via
# sonar.tests/sonar.test.inclusions (reclassifying these as test-role
# files entirely) broke the whole analysis instead - ncloc/code_smells/
# bugs/vulnerabilities all read ~0 on re-analysis. This property is
# narrower: it only excludes matching files from the coverage
# requirement, without touching sonar.sources/sonar.tests scanning at
# all, so it shouldn't carry the same risk - verified via re-analysis
# before trusting it (see CHANGELOG).
sonar.coverage.exclusions=tests/**/*.py,web-frontend/src/**/*.test.js
