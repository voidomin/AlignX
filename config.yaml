app:
  name: StructScope
  version: 3.34.0
  max_proteins: 20
core:
  max_proteins: 20
pdb:
  source_url: https://files.rcsb.org/download/
  timeout: 60
  max_file_size_mb: 500
  retry_attempts: 3
filtering:
  auto_filter_large_files: true
  size_threshold_mb: 50
  default_chain: null
  remove_heteroatoms: true
  remove_water: true
  remove_ligands: false
mustang:
  backend: wsl
  executable_path: null
  timeout: 600
foldseek:
  # "api": public search.foldseek.com (default - no setup required, but
  #   shared across all users at ~0.1 req/s, see docs/ROADMAP_V3.md Phase 5).
  # "local": a Foldseek binary + database on this machine (see
  #   foldseek.local below) - the scale-up path once "api" becomes a real
  #   bottleneck. Requires actually installing Foldseek and a search
  #   database, which is a deployment-time operational step, not something
  #   toggling this setting does by itself.
  backend: api
  base_url: https://search.foldseek.com
  timeout: 30
  poll_interval_seconds: 10
  max_poll_attempts: 60
  default_databases:
  - pdb100
  - afdb50
  local:
    binary_path: null
    database_dir: null
    timeout: 300
annotation:
  timeout: 15
  top_n_neighbors: 10
  cache_ttl_days: 30
  min_confident_probability: 0.5
phylip:
  executable: neighbor
  method: neighbor_joining
  bootstrap: 100
pymol:
  enabled: true
  executable: pymol
  headless: true
  ray_trace: false
  image_width: 1920
  image_height: 1080
output:
  base_dir: results
  keep_intermediates: true
  formats:
  - html
visualization:
  heatmap_colormap: viridis
  tree_format: rectangular
  dpi: 300
  viewer_default_style: cartoon
performance:
  max_workers: 4
  chunk_size: 8192
debug:
  verbose_logging: false
  save_raw_outputs: false
cache:
  max_cache_size_mb: 1000
  enabled: true
