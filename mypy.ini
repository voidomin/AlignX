[mypy]
# Matches the actual runtime (Dockerfile base image, CI's configured
# interpreter) - checking against 3.12 could pass code that relies on
# syntax/stdlib behavior unavailable on the Python 3.10 this app actually
# runs on.
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = True
disallow_untyped_defs = False
exclude = tests/|mustang_build/|__pycache__/

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-Bio.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-seaborn.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True
